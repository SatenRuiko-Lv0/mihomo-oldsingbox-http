name: Build

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "release or alpha"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - alpha
      version:
        description: "Stable tag to publish, for example v1.19.27. Empty means current ref name."
        required: false
      build_ref:
        description: "Git ref to check out for the build. Empty means the triggering ref."
        required: false
  push:
    branches:
      - Alpha
    tags:
      - "v*"
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write

env:
  GOTOOLCHAIN: local
  GO_VERSION: "1.26"
  ASSET_BASE: mihomo-android-arm64-v8

jobs:
  android-arm64-v8a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.build_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: "https://github.com/MetaCubeX/go/releases/download/build"
          go-version: ${{ env.GO_VERSION }}

      - name: Set variables
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ github.event.inputs.channel || '' }}"
          input_version="${{ github.event.inputs.version || '' }}"

          if [[ -z "$channel" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "Alpha" ]]; then
              channel="alpha"
            else
              channel="release"
            fi
          fi

          if [[ "$channel" == "alpha" ]]; then
            version="alpha-$(git rev-parse --short HEAD)"
            release_tag="Prerelease-Alpha"
            prerelease="true"
            asset="${ASSET_BASE}-${version}.bin"
          else
            if [[ -n "$input_version" ]]; then
              version="$input_version"
            elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              version="${GITHUB_REF_NAME}"
            else
              version="$(git describe --tags --abbrev=0)"
            fi
            release_tag="$version"
            prerelease="false"
            asset="${ASSET_BASE}-${version}.bin"
          fi

          {
            echo "CHANNEL=$channel"
            echo "VERSION=$version"
            echo "RELEASE_TAG=$release_tag"
            echo "PRERELEASE=$prerelease"
            echo "ASSET=$asset"
            echo "BUILDTIME=$(date -u)"
            echo "CGO_ENABLED=0"
          } >> "$GITHUB_ENV"

      - name: Test VMess transports
        run: go test ./transport/vmess ./adapter/outbound

      - name: Build Android arm64-v8a
        env:
          GOOS: android
          GOARCH: arm64
          GOARM64: v8.0
        run: |
          go build -v -tags "with_gvisor" -trimpath -ldflags "-X 'github.com/metacubex/mihomo/constant.Version=${VERSION}' -X 'github.com/metacubex/mihomo/constant.BuildTime=${BUILDTIME}' -w -s -buildid=" -o "${ASSET}"
          printf '%s\n' "${VERSION}" > version.txt
          sha256sum "${ASSET}" version.txt > checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-arm64-v8a
          path: |
            ${{ env.ASSET }}
            version.txt
            checksums.txt

      - name: Delete current release assets
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/github-script@v8
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG,
              });
              for (const asset of release.data.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Publish release
        if: ${{ github.event_name != 'pull_request' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.PRERELEASE }}
          make_latest: ${{ env.CHANNEL == 'release' }}
          fail_on_unmatched_files: true
          files: |
            ${{ env.ASSET }}
            version.txt
            checksums.txt
          body: |
            Fork build from SatenRuiko-Lv0/mihomo.

            Base channel: ${{ env.CHANNEL }}
            Version: ${{ env.VERSION }}
            Asset: ${{ env.ASSET }}
